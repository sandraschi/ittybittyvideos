# Minimal Windows CI — single job (fleet hygiene: speech-mcp pattern).
# Note: ittybitty is currently private; GitHub Actions are disabled on private
# fleet repos by default (see mcp-central-docs/standards/GITHUB_ACTIONS_NO_PRIVATE_CI.md).
# This workflow runs when the repo is public or Actions are explicitly re-enabled.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, test, webapp (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Webapp build
        run: |
          npm ci
          npm run build
        working-directory: webapp
